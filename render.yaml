services:
  - type: web
    name: lovechatty-backend
    env: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: TRUST_PROXY
        value: 1
      - key: LOG_LEVEL
        value: info
      - key: ENABLE_CLIENT_ERROR_INGEST
        value: true
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: lovechatty
      - key: CLIENT_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_KEY_2
        sync: false
      - key: SEARCH_API_KEY
        sync: false
